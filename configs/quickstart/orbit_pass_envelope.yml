orbit_pass:
  id: demo11_orbit_pass_envelope
  band: c_1550
  dt_s: 30
  samples:
    # Envelope-style samples: explicit pass points, not orbit propagation.
    - t_s: 0
      distance_km: 1200
      elevation_deg: 20
      background_counts_cps: 5000
    - t_s: 30
      distance_km: 900
      elevation_deg: 40
      background_counts_cps: 2000
    - t_s: 60
      distance_km: 600
      elevation_deg: 70
      background_counts_cps: 300
    - t_s: 90
      distance_km: 900
      elevation_deg: 40
      background_counts_cps: 2000
    - t_s: 120
      distance_km: 1200
      elevation_deg: 20
      background_counts_cps: 5000
  cases:
    - id: best
      label: Best case (night-like, low turbulence)
      channel_overrides:
        atmospheric_extinction_db_per_km: 0.01
        pointing_jitter_urad: 1.0
        turbulence_scintillation_index: 0.08
        background_counts_cps_scale: 0.3
    - id: median
      label: Median
      channel_overrides: {}
    - id: worst
      label: Worst case (day-like, high turbulence)
      channel_overrides:
        atmospheric_extinction_db_per_km: 0.05
        pointing_jitter_urad: 3.0
        turbulence_scintillation_index: 0.25
        background_counts_cps_scale: 2.0

source:
  type: emitter_cavity
  physics_backend: analytic
  rep_rate_mhz: 150
  collection_efficiency: 0.38
  coupling_efficiency: 0.62
  radiative_lifetime_ns: 1.0
  purcell_factor: 5
  dephasing_rate_per_ns: 0.5
  g2_0: 0.02
  pulse_window_ns: 5.0

channel:
  model: free_space
  connector_loss_db: 1.0
  dispersion_ps_per_km: 0.0
  tx_aperture_m: 0.12
  rx_aperture_m: 0.30
  beam_divergence_urad: 12.0
  pointing_jitter_urad: 1.5
  atmospheric_extinction_db_per_km: 0.02
  turbulence_scintillation_index: 0.15
  # background_counts_cps and elevation are sample-specific in orbit_pass.samples.
  background_counts_cps: 0.0
  elevation_deg: 45.0

detector:
  class: snspd
  pde: 0.3
  dark_counts_cps: 100
  jitter_ps_fwhm: 30
  dead_time_ns: 100
  afterpulsing_prob: 0.001

timing:
  sync_drift_ps_rms: 10
  coincidence_window_ps: 250

protocol:
  name: BBM92
  sifting_factor: 0.5
  ec_efficiency: 1.16

uncertainty: {}
