scenario:
  id: demo7_multifidelity_preview
  band: c_1550
  execution_mode: preview
  preview_uncertainty_samples: 20
  preview_detector_sample_scale: 0.2
  distance_km:
    start: 0
    stop: 80
    step: 20

source:
  type: emitter_cavity
  physics_backend: analytic
  rep_rate_mhz: 100
  collection_efficiency: 0.35
  coupling_efficiency: 0.60
  radiative_lifetime_ns: 1.0
  purcell_factor: 5
  dephasing_rate_per_ns: 0.5
  g2_0: 0.02
  drive_strength: 0.05
  pulse_window_ns: 5.0

channel:
  model: fiber
  fiber_loss_db_per_km: 0.2
  connector_loss_db: 1.5
  dispersion_ps_per_km: 5

detector:
  class: snspd
  physics_backend: stochastic
  sample_count: 400
  seed: 17
  time_bin_ps: 10.0
  afterpulse_delay_ns: 50.0
  pde: 0.3
  dark_counts_cps: 100
  jitter_ps_fwhm: 30
  dead_time_ns: 100
  afterpulsing_prob: 0.001

timing:
  sync_drift_ps_rms: 10
  coincidence_window_ps: 200

protocol:
  name: BBM92
  sifting_factor: 0.5
  ec_efficiency: 1.16

uncertainty:
  fiber_loss_db_per_km: 0.02
  pde: 0.05
  dark_counts: 1.0
  jitter: 0.20
  g2_0: 0.50
  mu: 0.30
