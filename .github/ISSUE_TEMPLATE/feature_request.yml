name: Feature request
description: Propose an improvement or new capability for PhotonTrust.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing your idea.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: A clear description of the user need.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you would like to see.
      placeholder: What should PhotonTrust do differently?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of PhotonTrust would this most affect?
      options:
        - CLI and configs
        - React product UI
        - API
        - Research and validation
        - PIC and GDS workflows
        - Orbit and satellite workflows
        - Documentation
        - Contributor tooling / CI
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternatives you evaluated.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, examples, or screenshots that help explain the request.
