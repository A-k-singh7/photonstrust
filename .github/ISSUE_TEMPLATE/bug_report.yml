name: Bug report
description: Report a reproducible problem in PhotonTrust.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
      placeholder: A short and clear description of the issue.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps so we can reproduce the problem.
      placeholder: |
        1. Run ...
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, and relevant package versions.
      placeholder: Python 3.11 on Windows 11; photonstrust 0.1.0
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or traceback
      render: shell
