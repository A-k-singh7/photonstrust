name: ci-smoke

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-smoke:
    name: core-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install smoke dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Resolve pre-commit diff range
        id: precommit-range
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "from_ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "to_ref=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            echo "from_ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "to_ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "from_ref=" >> "$GITHUB_OUTPUT"
            echo "to_ref=" >> "$GITHUB_OUTPUT"
          fi
      - name: Run pre-commit hooks
        shell: bash
        run: |
          if [[ -n "${{ steps.precommit-range.outputs.from_ref }}" && -n "${{ steps.precommit-range.outputs.to_ref }}" ]]; then
            pre-commit run --from-ref "${{ steps.precommit-range.outputs.from_ref }}" --to-ref "${{ steps.precommit-range.outputs.to_ref }}" --show-diff-on-failure
          else
            pre-commit run --all-files --show-diff-on-failure
          fi
      - name: Run CI guardrails smoke
        run: |
          python scripts/validation/ci_checks.py --pytest-args "-q tests/test_protocol_compiler.py tests/test_protocol_engine_contract.py tests/test_qkd_smoke.py"

  api-contract-smoke:
    name: api-contract-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install API lane dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api]"
      - name: Run API v1 contract smoke
        run: >-
          python -m pytest -q --import-mode=importlib
          tests/api/test_api_contract_v1.py
          tests/api/test_api_server_optional.py
          tests/api/test_api_auth_rbac.py
