name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run CI guardrails (compileall + pytest + validation harness smoke + coverage floor)
        run: python scripts/ci_checks.py --pytest-args "-q --cov=photonstrust --cov-report=term-missing:skip-covered --cov-fail-under=70"
      - name: Check benchmark drift
        if: matrix.python-version == '3.11'
        run: python scripts/check_benchmark_drift.py

  optional-dependency-lanes:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: qutip
            extras: dev,qutip
            smoke_module: qutip
          - lane: qiskit
            extras: dev,qiskit
            smoke_module: qiskit
          - lane: api
            extras: dev,api
            smoke_module: fastapi
          - lane: layout
            extras: dev,layout
            smoke_module: gdstk
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install optional lane dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[${{ matrix.extras }}]"
      - name: Verify dependency resolution
        run: python -m pip check
      - name: Optional lane import smoke
        run: python -c "import importlib; importlib.import_module('${{ matrix.smoke_module }}')"
