name: ci-smoke

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-smoke:
    name: core-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install smoke dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure
      - name: Run CI guardrails smoke
        run: |
          python scripts/validation/ci_checks.py --pytest-args "-q tests/test_protocol_compiler.py tests/test_protocol_engine_contract.py tests/test_qkd_smoke.py"

  api-contract-smoke:
    name: api-contract-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install API lane dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api]"
      - name: Run API v1 contract smoke
        run: >-
          python -m pytest -q --import-mode=importlib
          tests/api/test_api_contract_v1.py
          tests/api/test_api_server_optional.py
          tests/api/test_api_auth_rbac.py
