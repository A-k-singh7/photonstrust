name: security-baseline

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: read

jobs:
  pip-audit-runtime:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Export runtime requirements
        run: |
          python - <<'PY'
          import pathlib
          import tomllib

          pyproject = pathlib.Path("pyproject.toml")
          data = tomllib.loads(pyproject.read_text(encoding="utf-8"))
          deps = data.get("project", {}).get("dependencies", [])
          pathlib.Path("runtime-requirements.txt").write_text("\n".join(str(dep) for dep in deps) + "\n", encoding="utf-8")
          PY

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Audit Python dependencies
        run: pip-audit --requirement runtime-requirements.txt --progress-spinner off

  web-determinism-and-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Deterministic install check (lockfile + npm ci)
        run: npm ci

      - name: Audit runtime Node dependencies (non-blocking baseline)
        continue-on-error: true
        run: npm audit --omit=dev --audit-level=high
