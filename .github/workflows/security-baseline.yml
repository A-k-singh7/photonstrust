name: security-baseline

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * 1"

jobs:
  pip-audit-runtime:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install runtime deps and pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pip-audit

      - name: Audit Python dependencies
        run: pip-audit --progress-spinner off

  web-determinism-and-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deterministic install check (lockfile + npm ci)
        run: npm ci

      - name: Audit runtime Node dependencies (non-blocking baseline)
        continue-on-error: true
        run: npm audit --omit=dev --audit-level=high
