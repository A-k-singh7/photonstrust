name: ci-nightly-full

on:
  schedule:
    - cron: "15 2 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-nightly-full-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run pre-commit hooks
        if: matrix.python-version == '3.11'
        run: pre-commit run --all-files --show-diff-on-failure
      - name: Run CI guardrails (compileall + pytest + validation harness smoke + coverage floor)
        run: python scripts/ci_checks.py --pytest-args "-q --cov=photonstrust --cov-report=term-missing:skip-covered --cov-fail-under=70"
      - name: Check benchmark drift
        if: matrix.python-version == '3.11'
        run: python scripts/check_benchmark_drift.py

  api-contract-security:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install API lane dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api]"
      - name: Run API v1 contract and authz gates
        run: >-
          python -m pytest -q --import-mode=importlib
          tests/api/test_api_contract_v1.py
          tests/api/test_api_server_optional.py
          tests/api/test_api_auth_rbac.py

  protocol-parity-uncertainty:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install parity lane dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,qiskit]"
      - name: Run protocol engine parity tests
        run: python -m pytest -q tests/test_protocol_engine_contract.py tests/test_protocol_engine_parity.py tests/scripts/test_run_protocol_engine_parity_script.py
      - name: Run strict protocol parity gate
        run: python scripts/run_protocol_engine_parity.py --strict --engines qiskit,analytic --baseline qiskit --output-dir results/ci/protocol_parity
      - name: Run uncertainty integration tests
        run: python -m pytest -q tests/test_satellite_chain_pipeline.py tests/test_satellite_chain_schema.py tests/test_satellite_chain_reference.py tests/test_runtime_models.py

  optional-dependency-lanes:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: qutip
            extras: dev,qutip
            smoke_module: qutip
          - lane: qiskit
            extras: dev,qiskit
            smoke_module: qiskit
          - lane: api
            extras: dev,api
            smoke_module: fastapi
          - lane: layout
            extras: dev,layout
            smoke_module: gdstk
          - lane: distributed
            extras: dev,optuna,ray
            smoke_module: ray
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install optional lane dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[${{ matrix.extras }}]"
      - name: Verify dependency resolution
        run: python -m pip check
      - name: Optional lane checks
        run: |
          if [ "${{ matrix.lane }}" = "qutip" ]; then
            if [ "${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}" = "true" ]; then
              python scripts/run_qutip_parity_lane.py --strict --output-json results/ci/qutip_lane_report.json
            else
              python scripts/run_qutip_parity_lane.py --output-json results/ci/qutip_lane_report.json
            fi
          elif [ "${{ matrix.lane }}" = "qiskit" ]; then
            if [ "${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}" = "true" ]; then
              python scripts/run_qiskit_lane.py --strict --output-json results/ci/qiskit_lane_report.json
            else
              python scripts/run_qiskit_lane.py --output-json results/ci/qiskit_lane_report.json
            fi
          elif [ "${{ matrix.lane }}" = "distributed" ]; then
            python -m pytest -q tests/test_satellite_chain_sweep_backend.py tests/test_satellite_chain_optuna.py tests/scripts/test_run_satellite_chain_sweep_script.py tests/scripts/test_run_satellite_chain_optuna_script.py
            python scripts/run_satellite_chain_sweep.py configs/satellite/eagle1_analog_berlin.yml --backend local --max-workers 1 --seed 42 --max-retries 1 --output-root results/ci/distributed_sweep
            python scripts/run_satellite_chain_optuna.py configs/satellite/eagle1_analog_berlin.yml --n-trials 3 --seed 42 --output-dir results/ci/distributed_optuna --tracking-mode local_json
            python scripts/replay_satellite_chain_reports.py --sweep-report results/ci/distributed_sweep/satellite_chain_sweep.json --optuna-report results/ci/distributed_optuna/satellite_chain_optuna_report.json
          else
            python -c "import importlib; importlib.import_module('${{ matrix.smoke_module }}')"
          fi
