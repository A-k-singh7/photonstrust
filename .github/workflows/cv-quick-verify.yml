name: cv-quick-verify

on:
  push:
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: cv-quick-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies (core + quantum lanes)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,qutip,qiskit]"

      - name: Sanity-check CV/tapeout scripts
        run: |
          test -f scripts/run_cv_quick_verify.py
          test -f scripts/run_day10_tapeout_rehearsal.py
          test -f scripts/build_tapeout_package.py
          test -f scripts/materialize_local_tapeout_run.py

      - name: Run CV quick verify
        run: |
          python scripts/run_cv_quick_verify.py \
            --demo-label ci_cv_quick_verify \
            --output-root results/cv_quick_verify_ci

      - name: Run certify dry-run demo
        run: |
          python -m photonstrust.cli certify graphs/demo_qkd_transmitter.json --dry-run --output results/certify_ci_demo

      - name: Upload CV verify artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cv-quick-verify-artifacts
          path: |
            results/cv_quick_verify_ci/
            results/demo_pack/ci_cv_quick_verify/
            results/certify_ci_demo/

  tapeout-gate-final:
    name: Tapeout Gate Final
    needs: verify
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || github.event_name == 'pull_request' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))) }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tapeout dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,pic,api,layout]"

      - name: Run tapeout schema smoke tests
        run: |
          python -m pytest -q \
            tests/test_pic_tapeout_gate_schema.py \
            tests/test_day10_tapeout_rehearsal_packet_schema.py

      - name: Run Day 10 tapeout rehearsal
        run: |
          python scripts/run_day10_tapeout_rehearsal.py \
            --mode synthetic \
            --output-json results/day10_cv/day10_decision_packet.json \
            --run-dir results/day10_cv/run_pkg \
            --strict

      - name: Run Day 10 tapeout rehearsal (real local bootstrap)
        run: |
          python scripts/run_day10_tapeout_rehearsal.py \
            --mode real \
            --smoke-local-backend \
            --bootstrap-local-run-dir \
            --allow-ci \
            --output-json results/day10_cv_local/day10_decision_packet.json \
            --run-dir results/day10_cv_local/run_pkg \
            --strict

      - name: Validate Day 10 packet schema (CV artifact)
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from photonstrust.benchmarks.schema import validate_instance
          from photonstrust.workflow.schema import (
              day10_tapeout_rehearsal_packet_schema_path,
              pic_foundry_approval_sealed_summary_schema_path,
          )

          packet_path = Path("results/day10_cv/day10_decision_packet.json")
          payload = json.loads(packet_path.read_text(encoding="utf-8"))
          validate_instance(payload, day10_tapeout_rehearsal_packet_schema_path())
          print(f"validated packet schema: {packet_path}")

          for run_dir in (
              Path("results/day10_cv/run_pkg"),
              Path("results/day10_cv_local/run_pkg"),
          ):
              approval_path = run_dir / "foundry_approval_sealed_summary.json"
              summary = json.loads(approval_path.read_text(encoding="utf-8"))
              validate_instance(summary, pic_foundry_approval_sealed_summary_schema_path())
              print(f"validated foundry approval summary: {approval_path}")
          PY

      - name: Build tapeout package
        run: |
          python scripts/build_tapeout_package.py \
            --run-dir results/day10_cv/run_pkg \
            --output-root results/tapeout_packages_cv \
            --report-path results/day10_cv/tapeout_package_report.json

      - name: Validate package includes foundry approval summary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report_path = Path("results/day10_cv/tapeout_package_report.json")
          report = json.loads(report_path.read_text(encoding="utf-8"))
          package_dir = Path(str(report["package_dir"]))
          approval_path = package_dir / "verification" / "foundry_approval_sealed_summary.json"
          if not approval_path.is_file():
              raise SystemExit(f"missing packaged approval summary: {approval_path}")
          print(f"packaged approval summary: {approval_path}")
          PY

      - name: Upload tapeout artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cv-tapeout-artifacts
          path: |
            results/day10_cv/
            results/day10_cv_local/
            results/tapeout_packages_cv/

  release-gate-final:
    name: Release Gate Final
    needs: tapeout-gate-final
    if: ${{ needs.tapeout-gate-final.result == 'success' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')))) }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install release gate dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api,qutip,qiskit]"

      - name: Run release gate checks
        run: |
          python scripts/release/release_gate_check.py --quick --output results/release_gate_ci/release_gate_report.json
          python scripts/release/verify_release_gate_packet.py
          python scripts/release/verify_release_gate_packet_signature.py

      - name: Run production readiness checks (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          python scripts/production_readiness_check.py --recreate-venv --no-refresh-release-packet

      - name: Upload release gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-artifacts
          path: |
            results/release_gate_ci/
            results/release_gate/
