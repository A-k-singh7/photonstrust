name: tapeout-gate

on:
  push:
    paths:
      - ".github/workflows/tapeout-gate.yml"
      - ".github/workflows/cv-quick-verify.yml"
      - "graphs/**"
      - "configs/**"
      - "photonstrust/pic/**"
      - "photonstrust/layout/pic/**"
      - "photonstrust/pdk/**"
      - "scripts/check_pic_tapeout_gate.py"
      - "scripts/run_day10_tapeout_rehearsal.py"
      - "scripts/build_tapeout_package.py"
      - "schemas/photonstrust.pic_*"
      - "schemas/photonstrust.day10_tapeout_rehearsal_packet.v0.schema.json"
      - "tests/test_foundry_drc_sealed_runner.py"
      - "tests/test_pic_tapeout_gate.py"
      - "tests/test_pic_tapeout_gate_schema.py"
      - "tests/test_day10_tapeout_rehearsal.py"
      - "tests/test_day10_tapeout_rehearsal_packet_schema.py"
      - "tests/test_tapeout_package_builder.py"
  pull_request:
    paths:
      - ".github/workflows/tapeout-gate.yml"
      - ".github/workflows/cv-quick-verify.yml"
      - "graphs/**"
      - "configs/**"
      - "photonstrust/pic/**"
      - "photonstrust/layout/pic/**"
      - "photonstrust/pdk/**"
      - "scripts/check_pic_tapeout_gate.py"
      - "scripts/run_day10_tapeout_rehearsal.py"
      - "scripts/build_tapeout_package.py"
      - "schemas/photonstrust.pic_*"
      - "schemas/photonstrust.day10_tapeout_rehearsal_packet.v0.schema.json"
      - "tests/test_foundry_drc_sealed_runner.py"
      - "tests/test_pic_tapeout_gate.py"
      - "tests/test_pic_tapeout_gate_schema.py"
      - "tests/test_day10_tapeout_rehearsal.py"
      - "tests/test_day10_tapeout_rehearsal_packet_schema.py"
      - "tests/test_tapeout_package_builder.py"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tapeout-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tapeout-gate:
    name: PIC Tapeout Gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      IS_STRICT_RELEASE: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,pic,api,layout]"

      - name: Sanity-check tapeout scripts
        run: |
          test -f scripts/run_day10_tapeout_rehearsal.py
          test -f scripts/build_tapeout_package.py
          test -f scripts/check_pic_tapeout_gate.py
          test -f scripts/run_foundry_smoke.py
          test -f scripts/materialize_local_tapeout_run.py

      - name: Run tapeout lane unit tests
        run: |
          python -m pytest -q \
            tests/test_pic_layout_build_and_lvs_lite.py \
            tests/test_foundry_drc_sealed_runner.py \
            tests/test_foundry_lvs_pex_sealed_runner.py \
            tests/test_pic_signoff_core.py \
            tests/test_pic_tapeout_gate.py \
            tests/test_pic_tapeout_gate_schema.py \
            tests/test_day10_tapeout_rehearsal_packet_schema.py \
            tests/test_day10_tapeout_rehearsal.py::test_day10_rehearsal_synthetic_pass_emits_go_packet \
            tests/test_day10_tapeout_rehearsal.py::test_day10_rehearsal_synthetic_fail_returns_hold_in_strict_mode \
            tests/test_tapeout_package_builder.py

      - name: Run Day 10 tapeout rehearsal (synthetic strict)
        run: |
          python scripts/run_day10_tapeout_rehearsal.py \
            --mode synthetic \
            --output-json results/day10_ci/day10_decision_packet.json \
            --run-dir results/day10_ci/run_pkg \
            --strict

      - name: Run Day 10 tapeout rehearsal (real local bootstrap strict)
        run: |
          python scripts/run_day10_tapeout_rehearsal.py \
            --mode real \
            --smoke-local-backend \
            --bootstrap-local-run-dir \
            --allow-ci \
            --output-json results/day10_ci_local/day10_decision_packet.json \
            --run-dir results/day10_ci_local/run_pkg \
            --strict

      - name: Validate Day 10 packet schema (CI artifact)
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from photonstrust.benchmarks.schema import validate_instance
          from photonstrust.workflow.schema import (
              day10_tapeout_rehearsal_packet_schema_path,
              pic_foundry_approval_sealed_summary_schema_path,
          )

          packet_path = Path("results/day10_ci/day10_decision_packet.json")
          payload = json.loads(packet_path.read_text(encoding="utf-8"))
          validate_instance(payload, day10_tapeout_rehearsal_packet_schema_path())
          print(f"validated packet schema: {packet_path}")

          for run_dir in (
              Path("results/day10_ci/run_pkg"),
              Path("results/day10_ci_local/run_pkg"),
          ):
              approval_path = run_dir / "foundry_approval_sealed_summary.json"
              summary = json.loads(approval_path.read_text(encoding="utf-8"))
              validate_instance(summary, pic_foundry_approval_sealed_summary_schema_path())
              print(f"validated foundry approval summary: {approval_path}")
          PY

      - name: Build deterministic tapeout package
        run: |
          python scripts/build_tapeout_package.py \
            --run-dir results/day10_ci/run_pkg \
            --output-root results/tapeout_packages_ci \
            --report-path results/day10_ci/tapeout_package_report.json

      - name: Validate package includes foundry approval summary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report_path = Path("results/day10_ci/tapeout_package_report.json")
          report = json.loads(report_path.read_text(encoding="utf-8"))
          package_dir = Path(str(report["package_dir"]))
          approval_path = package_dir / "verification" / "foundry_approval_sealed_summary.json"
          if not approval_path.is_file():
              raise SystemExit(f"missing packaged approval summary: {approval_path}")
          print(f"packaged approval summary: {approval_path}")
          PY

      - name: Release gate checks (main/tag push only)
        if: env.IS_STRICT_RELEASE == 'true'
        run: |
          python scripts/release/release_gate_check.py --output results/release_gate_ci/release_gate_report.json
          python scripts/release/verify_release_gate_packet.py
          python scripts/release/verify_release_gate_packet_signature.py

      - name: Upload tapeout artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tapeout-gate-artifacts
          path: |
            results/day10_ci/
            results/day10_ci_local/
            results/tapeout_packages_ci/
